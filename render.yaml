services:
  - type: web
    name: gemini-web-proxy
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: GEMINI_COOKIE
        sync: false
      - key: API_KEYS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
